name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check apps/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy apps/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: appointments_test
          POSTGRES_USER: appointments
          POSTGRES_PASSWORD: change-me
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - "6379:6379"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest apps/ --cov=apps --cov-report=xml --cov-report=term-missing
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          POSTGRES_HOST: localhost
          POSTGRES_DB: appointments_test
          POSTGRES_USER: appointments
          POSTGRES_PASSWORD: change-me
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
      - uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage.xml
