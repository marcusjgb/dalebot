services:
  web:
    build:
      context: .
      target: development
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=appointments
      - POSTGRES_USER=appointments
      - POSTGRES_PASSWORD=change-me
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  worker:
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=appointments
      - POSTGRES_USER=appointments
      - POSTGRES_PASSWORD=change-me
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - .:/app

  beat:
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=appointments
      - POSTGRES_USER=appointments
      - POSTGRES_PASSWORD=change-me
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - .:/app

  db:
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
