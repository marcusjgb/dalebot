<div id="modal-backdrop" class="fixed inset-0 bg-argen-900/60 backdrop-blur-sm z-40"
     hx-on:click="this.nextElementSibling.remove(); this.remove()"></div>
<div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lifted max-w-lg w-full max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-5 border-b border-argen-100 flex justify-between items-center bg-gradient-to-r from-argen-50 to-white">
            <h3 class="text-lg font-display font-semibold text-argen-800">Nuevo Cliente</h3>
            <button hx-on:click="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                    class="w-8 h-8 rounded-lg flex items-center justify-center text-argen-400 hover:text-argen-600 hover:bg-argen-100 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <form hx-post="{% url 'customers_create' %}"
              hx-target="#form-result"
              hx-swap="innerHTML"
              class="p-6 space-y-4">
            {% csrf_token %}
            <div>
                <label for="name" class="block text-sm font-medium text-argen-700 mb-1.5">Nombre *</label>
                <input type="text" name="name" id="name" required
                       class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all"
                       placeholder="Juan Pérez">
            </div>
            <div>
                <label for="phone" class="block text-sm font-medium text-argen-700 mb-1.5">Teléfono *</label>
                <input type="text" name="phone" id="phone" required
                       placeholder="+54 11 1234-5678"
                       class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-argen-700 mb-1.5">Email</label>
                <input type="email" name="email" id="email"
                       class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all"
                       placeholder="juan@ejemplo.com">
            </div>
            <div>
                <label for="notes" class="block text-sm font-medium text-argen-700 mb-1.5">Notas</label>
                <textarea name="notes" id="notes" rows="2"
                          class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all resize-none"
                          placeholder="Notas adicionales..."></textarea>
            </div>
            <div id="form-result"></div>
            <div class="flex justify-end gap-3 pt-4">
                <button type="button" onclick="document.getElementById('modal').remove(); document.getElementById('modal-backdrop').remove()"
                        class="px-5 py-2.5 border border-argen-200 rounded-xl text-sm font-medium text-argen-700 hover:bg-argen-50 transition-colors">
                    Cancelar
                </button>
                <button type="submit"
                        class="btn-primary px-5 py-2.5 text-white rounded-xl text-sm font-medium">
                    Crear cliente
                </button>
            </div>
        </form>
    </div>
</div>
