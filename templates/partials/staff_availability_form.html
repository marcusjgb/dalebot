<div id="modal-backdrop" class="fixed inset-0 bg-argen-900/60 backdrop-blur-sm z-40"
     onclick="if(event.target === this) { this.nextElementSibling.remove(); this.remove(); }"></div>
<div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lifted max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col">
        <div class="px-6 py-5 border-b border-argen-100 flex justify-between items-center bg-gradient-to-r from-argen-50 to-white flex-shrink-0">
            <div>
                <h3 class="text-lg font-display font-semibold text-argen-800">Disponibilidad</h3>
                <p class="text-sm text-argen-500 mt-0.5">{{ staff.user.get_full_name|default:staff.user.username }}</p>
            </div>
            <button onclick="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                    class="w-8 h-8 rounded-lg flex items-center justify-center text-argen-400 hover:text-argen-600 hover:bg-argen-100 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div class="p-6 overflow-y-auto flex-1">
            <div id="slots-list">
                {% include "partials/staff_availability_slots.html" %}
            </div>

            <div class="mt-6 pt-6 border-t border-argen-100">
                <h4 class="text-sm font-semibold text-argen-700 mb-4">Agregar horario</h4>
                <form hx-post="{% url 'staff_availability' staff.id %}"
                      hx-target="#slots-list"
                      hx-swap="innerHTML"
                      class="flex flex-wrap gap-3 items-end">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="add">

                    <div>
                        <label for="day" class="block text-xs font-medium text-argen-600 mb-1.5">Día</label>
                        <select name="day" id="day" required
                                class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-sm text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 bg-white">
                            <option value="0">Lunes</option>
                            <option value="1">Martes</option>
                            <option value="2">Miércoles</option>
                            <option value="3">Jueves</option>
                            <option value="4">Viernes</option>
                            <option value="5">Sábado</option>
                            <option value="6">Domingo</option>
                        </select>
                    </div>

                    <div>
                        <label for="start_time" class="block text-xs font-medium text-argen-600 mb-1.5">Desde</label>
                        <input type="time" name="start_time" id="start_time" required
                               class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-sm text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500">
                    </div>

                    <div>
                        <label for="end_time" class="block text-xs font-medium text-argen-600 mb-1.5">Hasta</label>
                        <input type="time" name="end_time" id="end_time" required
                               class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-sm text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500">
                    </div>

                    <button type="submit"
                            class="btn-primary px-4 py-2.5 text-white rounded-xl text-sm font-medium flex-shrink-0">
                        Agregar
                    </button>
                </form>
            </div>
        </div>

        <div class="px-6 py-4 border-t border-argen-100 bg-argen-50 flex-shrink-0">
            <p class="text-xs text-argen-500">
                <strong>Tip:</strong> Los horarios configurados aquí determinan cuando el staff puede recibir turnos.
                Podés agregar múltiples franjas por día.
            </p>
        </div>
    </div>
</div>
