<div id="modal-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-40"
     hx-on:click="this.nextElementSibling.remove(); this.remove()"></div>
<div id="modal" class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-lg font-medium text-gray-900">Nuevo Personal</h3>
            <button hx-on:click="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                    class="text-gray-400 hover:text-gray-600">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <form hx-post="{% url 'staff_create' %}"
              hx-target="#form-result"
              hx-swap="innerHTML"
              class="p-6 space-y-4">
            {% csrf_token %}
            <div>
                <label for="user" class="block text-sm font-medium text-gray-700">Usuario *</label>
                <select name="user_id" id="user" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="">Seleccionar usuario...</option>
                    {% for user in available_users %}
                    <option value="{{ user.id }}">{{ user.username }} ({{ user.email }})</option>
                    {% empty %}
                    <option value="" disabled>No hay usuarios disponibles</option>
                    {% endfor %}
                </select>
                <p class="mt-1 text-xs text-gray-500">
                    {% if not available_users %}
                    Creá primero un usuario desde el panel Admin.
                    {% else %}
                    Solo se muestran usuarios sin personal asignado.
                    {% endif %}
                </p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Servicios</label>
                <div class="space-y-2 max-h-40 overflow-y-auto border border-gray-200 rounded-md p-2">
                    {% for service in services %}
                    <label class="flex items-center">
                        <input type="checkbox" name="service_ids" value="{{ service.id }}"
                               class="rounded border-gray-300 text-indigo-600 shadow-sm focus:ring-indigo-500">
                        <span class="ml-2 text-sm text-gray-700">{{ service.name }}</span>
                    </label>
                    {% empty %}
                    <p class="text-sm text-gray-500">No hay servicios disponibles</p>
                    {% endfor %}
                </div>
            </div>
            <div id="form-result"></div>
            <div class="flex justify-end space-x-3 pt-4">
                <button type="button" onclick="document.getElementById('modal').remove(); document.getElementById('modal-backdrop').remove()"
                        class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
                    Cancelar
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
                    Crear personal
                </button>
            </div>
        </form>
    </div>
</div>
