<div id="modal-backdrop" class="fixed inset-0 bg-argen-900/60 backdrop-blur-sm z-40"
     onclick="if(event.target === this) { this.nextElementSibling.remove(); this.remove(); }"></div>
<div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lifted max-w-lg w-full max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-5 border-b border-argen-100 flex justify-between items-center bg-gradient-to-r from-argen-50 to-white">
            <h3 class="text-lg font-display font-semibold text-argen-800">Editar Turno</h3>
            <button onclick="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                    class="w-8 h-8 rounded-lg flex items-center justify-center text-argen-400 hover:text-argen-600 hover:bg-argen-100 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <form hx-post="{% url 'appointments_edit' appointment.id %}"
              hx-target="#modal"
              hx-swap="none"
              hx-on:htmx:after-request="if(event.detail.successful) { document.getElementById('modal').remove(); document.getElementById('modal-backdrop').remove(); window.location.reload(); }"
              class="p-6 space-y-4">
            {% csrf_token %}
            <div>
                <label for="customer" class="block text-sm font-medium text-argen-700 mb-1.5">Cliente</label>
                <select name="customer_id" id="customer" required
                        class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all bg-white">
                    {% for customer in customers %}
                    <option value="{{ customer.id }}" {% if customer.id == appointment.customer.id %}selected{% endif %}>
                        {{ customer.name }} ({{ customer.phone }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="service" class="block text-sm font-medium text-argen-700 mb-1.5">Servicio</label>
                <select name="service_id" id="service" required
                        class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all bg-white">
                    {% for service in services %}
                    <option value="{{ service.id }}" {% if service.id == appointment.service.id %}selected{% endif %}>
                        {{ service.name }} ({{ service.duration_minutes }} min)
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="staff" class="block text-sm font-medium text-argen-700 mb-1.5">Personal</label>
                <select name="staff_id" id="staff" required
                        class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all bg-white">
                    {% for staff in staff_members %}
                    <option value="{{ staff.id }}" {% if staff.id == appointment.staff.id %}selected{% endif %}>
                        {{ staff.user.get_full_name|default:staff.user.username }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="date" class="block text-sm font-medium text-argen-700 mb-1.5">Fecha</label>
                    <input type="date" name="date" id="date" required
                           value="{{ appointment.starts_at|date:'Y-m-d' }}"
                           class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all">
                </div>
                <div>
                    <label for="time" class="block text-sm font-medium text-argen-700 mb-1.5">Hora</label>
                    <input type="time" name="time" id="time" required
                           value="{{ appointment.starts_at|time:'H:i' }}"
                           class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all">
                </div>
            </div>
            <div>
                <label for="notes" class="block text-sm font-medium text-argen-700 mb-1.5">Notas</label>
                <textarea name="notes" id="notes" rows="2"
                          class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all resize-none">{{ appointment.notes|default:"" }}</textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4">
                <button type="button" onclick="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                        class="px-5 py-2.5 border border-argen-200 rounded-xl text-sm font-medium text-argen-700 hover:bg-argen-50 transition-colors">
                    Cancelar
                </button>
                <button type="submit"
                        class="btn-primary px-5 py-2.5 text-white rounded-xl text-sm font-medium">
                    Guardar cambios
                </button>
            </div>
        </form>
    </div>
</div>
