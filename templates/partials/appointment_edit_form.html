<div id="modal-backdrop" class="fixed inset-0 bg-argen-900/60 backdrop-blur-sm z-40"
     onclick="if(event.target === this) { this.nextElementSibling.remove(); this.remove(); }"></div>
<div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lifted max-w-lg w-full max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-5 border-b border-argen-100 flex justify-between items-center bg-gradient-to-r from-argen-50 to-white">
            <h3 class="text-lg font-display font-semibold text-argen-800">Editar Turno</h3>
            <button onclick="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                    class="w-8 h-8 rounded-lg flex items-center justify-center text-argen-400 hover:text-argen-600 hover:bg-argen-100 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <form hx-post="{% url 'appointments_edit' appointment.id %}"
              hx-target="#modal"
              hx-swap="none"
              hx-on:htmx:after-request="if(event.detail.successful) { document.getElementById('modal').remove(); document.getElementById('modal-backdrop').remove(); window.location.reload(); }"
              class="p-6 space-y-4">
            {% csrf_token %}
            <div>
                <label for="customer" class="block text-sm font-medium text-argen-700 mb-1.5">Cliente</label>
                <select name="customer_id" id="customer" required
                        class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all bg-white">
                    {% for customer in customers %}
                    <option value="{{ customer.id }}" {% if customer.id == appointment.customer.id %}selected{% endif %}>
                        {{ customer.name }} ({{ customer.phone }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="service" class="block text-sm font-medium text-argen-700 mb-1.5">Servicio</label>
                <select name="service_id" id="service_edit" required
                        class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all bg-white">
                    {% for service in services %}
                    <option value="{{ service.id }}" data-duration="{{ service.duration_minutes }}" {% if service.id == appointment.service.id %}selected{% endif %}>
                        {{ service.name }} ({{ service.duration_minutes }} min)
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="staff" class="block text-sm font-medium text-argen-700 mb-1.5">Personal</label>
                <select name="staff_id" id="staff_edit" required
                        class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all bg-white">
                    {% for staff in staff_members %}
                    <option value="{{ staff.id }}">{{ staff.user.get_full_name|default:staff.user.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="date_edit" class="block text-sm font-medium text-argen-700 mb-1.5">Fecha</label>
                <input type="date" name="date" id="date_edit" required
                       value="{{ appointment.starts_at|date:'Y-m-d' }}"
                       min="{{ today }}"
                       class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all">
            </div>
            <div id="time-slots-container-edit">
                <label class="block text-sm font-medium text-argen-700 mb-1.5">Horario</label>
                <div id="time-slots-message-edit" class="text-sm text-argen-500 py-2">
                    Seleccioná una fecha para ver los horarios disponibles
                </div>
                <div id="time-slots-edit" class="flex flex-wrap gap-2 hidden"></div>
                <input type="hidden" name="time" id="selected_time_edit" required value="{{ appointment.starts_at|time:'H:i' }}">
            </div>
            <div>
                <label for="notes" class="block text-sm font-medium text-argen-700 mb-1.5">Notas</label>
                <textarea name="notes" id="notes" rows="2"
                          class="w-full border border-argen-200 rounded-xl py-2.5 px-3 text-argen-800 focus:outline-none focus:ring-2 focus:ring-argen-500 focus:border-argen-500 transition-all resize-none">{{ appointment.notes|default:"" }}</textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4">
                <button type="button" onclick="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                        class="px-5 py-2.5 border border-argen-200 rounded-xl text-sm font-medium text-argen-700 hover:bg-argen-50 transition-colors">
                    Cancelar
                </button>
                <button type="submit"
                        class="btn-primary px-5 py-2.5 text-white rounded-xl text-sm font-medium">
                    Guardar cambios
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date_edit').min = today;

    function selectTimeSlotEdit(time) {
        document.querySelectorAll('#time-slots-edit .time-slot').forEach(btn => {
            btn.classList.remove('bg-argen-500', 'text-white', 'border-argen-500');
            btn.classList.add('border-argen-200', 'text-argen-700', 'bg-white');
        });
        const selectedBtn = document.querySelector(`#time-slots-edit .time-slot[data-time="${time}"]`);
        if (selectedBtn) {
            selectedBtn.classList.add('bg-argen-500', 'text-white', 'border-argen-500');
            selectedBtn.classList.remove('border-argen-200', 'text-argen-700', 'bg-white');
        }
        document.getElementById('selected_time_edit').value = time;
    }

    document.getElementById('date_edit').addEventListener('change', function() {
        const date = this.value;
        const staffId = document.getElementById('staff_edit').value;
        const serviceId = document.getElementById('service_edit').value;
        const messageEl = document.getElementById('time-slots-message-edit');
        const slotsEl = document.getElementById('time-slots-edit');

        if (!date || !staffId || !serviceId) {
            messageEl.textContent = 'Seleccioná fecha, servicio y personal para ver horarios disponibles';
            slotsEl.classList.add('hidden');
            return;
        }

        messageEl.textContent = 'Cargando horarios...';
        slotsEl.classList.add('hidden');

        const url = `/appointments/available-slots/?date=${date}&staff_id=${staffId}&service_id=${serviceId}`;

        fetch(url)
            .then(response => response.text())
            .then(html => {
                slotsEl.innerHTML = html;
                slotsEl.classList.remove('hidden');
                messageEl.textContent = '';
            })
            .catch(err => {
                messageEl.textContent = 'Error al cargar horarios';
            });
    });

    document.getElementById('staff_edit').addEventListener('change', function() {
        document.getElementById('date_edit').dispatchEvent(new Event('change'));
    });

    document.getElementById('service_edit').addEventListener('change', function() {
        document.getElementById('date_edit').dispatchEvent(new Event('change'));
    });
</script>
