<div id="modal-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-40"
     onclick="if(event.target === this) { this.nextElementSibling.remove(); this.remove(); }"></div>
<div id="modal" class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-lg font-medium text-gray-900">Editar Turno</h3>
            <button onclick="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                    class="text-gray-400 hover:text-gray-600">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <form hx-post="{% url 'appointments_edit' appointment.id %}"
              hx-target="#modal"
              hx-swap="none"
              hx-on:htmx:after-request="if(event.detail.successful) { document.getElementById('modal').remove(); document.getElementById('modal-backdrop').remove(); window.location.reload(); }"
              class="p-6 space-y-4">
            {% csrf_token %}
            <div>
                <label for="customer" class="block text-sm font-medium text-gray-700">Cliente</label>
                <select name="customer_id" id="customer" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                    {% for customer in customers %}
                    <option value="{{ customer.id }}" {% if customer.id == appointment.customer.id %}selected{% endif %}>
                        {{ customer.name }} ({{ customer.phone }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="service" class="block text-sm font-medium text-gray-700">Servicio</label>
                <select name="service_id" id="service" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                    {% for service in services %}
                    <option value="{{ service.id }}" {% if service.id == appointment.service.id %}selected{% endif %}>
                        {{ service.name }} ({{ service.duration_minutes }} min)
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="staff" class="block text-sm font-medium text-gray-700">Personal</label>
                <select name="staff_id" id="staff" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                    {% for staff in staff_members %}
                    <option value="{{ staff.id }}" {% if staff.id == appointment.staff.id %}selected{% endif %}>
                        {{ staff.user.get_full_name|default:staff.user.username }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="date" class="block text-sm font-medium text-gray-700">Fecha</label>
                    <input type="date" name="date" id="date" required
                           value="{{ appointment.starts_at|date:'Y-m-d' }}"
                           class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label for="time" class="block text-sm font-medium text-gray-700">Hora</label>
                    <input type="time" name="time" id="time" required
                           value="{{ appointment.starts_at|time:'H:i' }}"
                           class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
            <div>
                <label for="notes" class="block text-sm font-medium text-gray-700">Notas</label>
                <textarea name="notes" id="notes" rows="2"
                          class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">{{ appointment.notes|default:"" }}</textarea>
            </div>
            <div class="flex justify-end space-x-3 pt-4">
                <button type="button" onclick="this.closest('#modal').remove(); document.getElementById('modal-backdrop').remove()"
                        class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
                    Cancelar
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
                    Guardar cambios
                </button>
            </div>
        </form>
    </div>
</div>
