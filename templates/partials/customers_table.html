{% if customers %}
<div class="overflow-x-auto">
<table class="w-full">
    <thead>
        <tr class="border-b border-argen-100">
            <th class="px-5 py-4 text-left text-xs font-semibold text-argen-500 uppercase tracking-wider">Nombre</th>
            <th class="px-5 py-4 text-left text-xs font-semibold text-argen-500 uppercase tracking-wider">Teléfono</th>
            <th class="px-5 py-4 text-left text-xs font-semibold text-argen-500 uppercase tracking-wider">Email</th>
            <th class="px-5 py-4 text-left text-xs font-semibold text-argen-500 uppercase tracking-wider">Turnos</th>
        </tr>
    </thead>
    <tbody class="divide-y divide-argen-100">
        {% for customer in customers %}
        <tr class="hover:bg-argen-50 transition-colors">
            <td class="px-5 py-4">
                <div class="text-sm font-semibold text-argen-800">{{ customer.name }}</div>
            </td>
            <td class="px-5 py-4">
                <div class="text-sm text-argen-700">{{ customer.phone }}</div>
            </td>
            <td class="px-5 py-4">
                <div class="text-sm text-argen-500">{{ customer.email|default:"-" }}</div>
            </td>
            <td class="px-5 py-4">
                <div class="text-sm text-argen-500">{{ customer.appointments.count }}</div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% else %}
<div class="text-center py-16">
    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-argen-100 flex items-center justify-center">
        <svg class="w-8 h-8 text-argen-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
    </div>
    <h3 class="text-sm font-semibold text-argen-800">No hay clientes</h3>
    <p class="text-sm text-argen-500 mt-1">Comienza agregando un nuevo cliente.</p>
</div>
{% endif %}
