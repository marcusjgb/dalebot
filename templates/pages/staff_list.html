{% extends "base.html" %}

{% block title %}Personal - DaleBot{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-display font-bold text-argen-800">Personal</h1>
            <p class="text-argen-500 mt-1">Gestiona tu equipo de trabajo</p>
        </div>
        <button hx-get="{% url 'staff_create' %}"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="btn-primary px-5 py-2.5 text-white font-medium rounded-xl shadow-lg shadow-accent-500/25">
            + Nuevo personal
        </button>
    </div>

    <div class="bg-white rounded-xl shadow-soft border border-argen-100 overflow-hidden">
        <div id="staff-list">
            {% include "partials/staff_table.html" %}
        </div>
    </div>
</div>

<div id="modal-container"></div>
{% endblock %}
