{% extends "base.html" %}

{% block title %}Iniciar sesión - DaleBot{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h1 class="text-center text-3xl font-bold text-indigo-600">DaleBot</h1>
            <h2 class="mt-6 text-center text-2xl font-bold text-gray-900">Iniciar sesión</h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Sistema de turnos por WhatsApp
            </p>
        </div>
        <form class="mt-8 space-y-6" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">Usuario</label>
                    <input type="text" name="username" id="id_username" required
                           class="mt-1 appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                           placeholder="Tu usuario">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" name="password" id="id_password" required
                           class="mt-1 appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                           placeholder="Tu contraseña">
                </div>
            </div>

            {% if form.errors %}
            <div class="rounded-md bg-red-50 p-4">
                <div class="text-sm text-red-700">
                    Usuario o contraseña incorrectos.
                </div>
            </div>
            {% endif %}

            <button type="submit"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Iniciar sesión
            </button>
        </form>
    </div>
</div>
{% endblock %}
