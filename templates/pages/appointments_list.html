{% extends "base.html" %}

{% block title %}Turnos - DaleBot{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">Turnos</h1>
            <button hx-get="{% url 'appointments_create' %}"
                    hx-target="#modal-container"
                    hx-swap="innerHTML"
                    class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
                + Nuevo turno
            </button>
    </div>

    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <div class="flex space-x-4">
                <button hx-get="{% url 'appointments:list' %}"
                        hx-trigger="click"
                        hx-target="#appointments-list"
                        class="px-3 py-1 text-sm rounded-md {% if status == 'all' %}bg-indigo-100 text-indigo-700{% endif %}">
                    Todos
                </button>
                <button class="px-3 py-1 text-sm rounded-md text-gray-600 hover:bg-gray-100">
                    Pendientes
                </button>
                <button class="px-3 py-1 text-sm rounded-md text-gray-600 hover:bg-gray-100">
                    Confirmados
                </button>
            </div>
        </div>
        <div id="appointments-list" class="p-6" hx-get="{% url 'appointments:list' %}" hx-trigger="revealed" hx-swap="innerHTML">
            {% include "partials/appointments_table.html" %}
        </div>
    </div>
</div>

<div id="modal-container"></div>
{% endblock %}
