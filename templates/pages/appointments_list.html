{% extends "base.html" %}

{% block title %}Turnos - DaleBot{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">Turnos</h1>
            <button hx-get="{% url 'appointments_create' %}"
                    hx-target="#modal-container"
                    hx-swap="innerHTML"
                    class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
                + Nuevo turno
            </button>
    </div>

    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <div class="flex space-x-2">
                <button hx-get="{% url 'appointments_list' %}"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        hx-include="[name='search']"
                        class="px-3 py-1 text-sm rounded-md {% if not current_status %}bg-indigo-100 text-indigo-700{% else %}bg-gray-100 text-gray-700 hover:bg-gray-200{% endif %}">
                    Todos
                </button>
                <button hx-get="{% url 'appointments_list' %}?status=pending"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-3 py-1 text-sm rounded-md {% if current_status == 'pending' %}bg-yellow-100 text-yellow-700{% else %}bg-gray-100 text-gray-700 hover:bg-gray-200{% endif %}">
                    Pendientes
                </button>
                <button hx-get="{% url 'appointments_list' %}?status=confirmed"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-3 py-1 text-sm rounded-md {% if current_status == 'confirmed' %}bg-green-100 text-green-700{% else %}bg-gray-100 text-gray-700 hover:bg-gray-200{% endif %}">
                    Confirmados
                </button>
                <button hx-get="{% url 'appointments_list' %}?status=completed"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-3 py-1 text-sm rounded-md {% if current_status == 'completed' %}bg-blue-100 text-blue-700{% else %}bg-gray-100 text-gray-700 hover:bg-gray-200{% endif %}">
                    Completados
                </button>
                <button hx-get="{% url 'appointments_list' %}?status=cancelled"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-3 py-1 text-sm rounded-md {% if current_status == 'cancelled' %}bg-red-100 text-red-700{% else %}bg-gray-100 text-gray-700 hover:bg-gray-200{% endif %}">
                    Cancelados
                </button>
            </div>
        </div>
        <div id="appointments-list" class="p-6">
            {% include "partials/appointments_table.html" %}
        </div>
    </div>
</div>

<div id="modal-container"></div>
{% endblock %}
