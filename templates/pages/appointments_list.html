{% extends "base.html" %}

{% block title %}Turnos - DaleBot{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-display font-bold text-argen-800">Turnos</h1>
            <p class="text-argen-500 mt-1">Gestiona los turnos de tu negocio</p>
        </div>
        <button hx-get="{% url 'appointments_create' %}"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="btn-primary px-5 py-2.5 text-white font-medium rounded-xl shadow-lg shadow-accent-500/25">
            + Nuevo turno
        </button>
    </div>

    <div class="bg-white rounded-xl shadow-soft border border-argen-100 overflow-hidden">
        <div class="px-5 py-4 border-b border-argen-100 overflow-x-auto">
            <div class="flex space-x-2 min-w-max">
                <button hx-get="{% url 'appointments_list' %}"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% if not current_status %}bg-argen-600 text-white shadow-md{% else %}bg-argen-50 text-argen-700 hover:bg-argen-100{% endif %}">
                    Todos
                </button>
                <button hx-get="{% url 'appointments_list' %}?status=pending"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% if current_status == 'pending' %}bg-amber-500 text-white shadow-md{% else %}bg-argen-50 text-argen-700 hover:bg-argen-100{% endif %}">
                    Pendientes
                </button>
                <button hx-get="{% url 'appointments_list' %}?status=confirmed"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% if current_status == 'confirmed' %}bg-green-500 text-white shadow-md{% else %}bg-argen-50 text-argen-700 hover:bg-argen-100{% endif %}">
                    Confirmados
                </button>
                <button hx-get="{% url 'appointments_list' %}?status=completed"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% if current_status == 'completed' %}bg-blue-500 text-white shadow-md{% else %}bg-argen-50 text-argen-700 hover:bg-argen-100{% endif %}">
                    Completados
                </button>
                <button hx-get="{% url 'appointments_list' %}?status=cancelled"
                        hx-target="#appointments-list"
                        hx-swap="innerHTML"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% if current_status == 'cancelled' %}bg-red-500 text-white shadow-md{% else %}bg-argen-50 text-argen-700 hover:bg-argen-100{% endif %}">
                    Cancelados
                </button>
            </div>
        </div>
        <div id="appointments-list">
            {% include "partials/appointments_table.html" %}
        </div>
    </div>
</div>

<div id="modal-container"></div>
{% endblock %}
